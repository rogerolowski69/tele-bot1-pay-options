# Railway config for the API service
# In Railway: Service → Settings → Config file path → infra/railway/api.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/python.Dockerfile"
watchPatterns = ["apps/api/**", "packages/**", "pyproject.toml", "uv.lock"]

[deploy]
startCommand = "sh scripts/railway/start-api.sh"
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
