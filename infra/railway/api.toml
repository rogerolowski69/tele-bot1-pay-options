# Railway config for the API service
# In Railway: Service → Settings → Config file path → infra/railway/api.toml
# (Or use root railway.json — config-as-code overrides dashboard settings.)

[build]
builder = "RAILPACK"
watchPatterns = ["apps/api/**", "packages/**", "pyproject.toml", "uv.lock", "scripts/**", "migrations/**", "railpack.json", "alembic.ini", "railway.json"]

[deploy]
preDeployCommand = ["uv run alembic upgrade head && uv run python scripts/seed_packages.py"]
startCommand = "sh scripts/railway/start-api.sh"
healthcheckPath = "/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
