# Railway config for the Bot worker (no public domain)
# In Railway: Service → Settings → Config file path → infra/railway/bot.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/python.Dockerfile"
watchPatterns = ["apps/bot/**", "packages/**", "pyproject.toml", "uv.lock"]

[deploy]
startCommand = "sh scripts/railway/start-bot.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
