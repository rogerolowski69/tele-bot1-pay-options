services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-telegram_payments}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-telegram_payments}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - app
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/docker/python.Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-telegram_payments}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      TON_RECEIVE_ADDRESS: ${TON_RECEIVE_ADDRESS:-}
      TON_NETWORK: ${TON_NETWORK:-testnet}
      TONAPI_KEY: ${TONAPI_KEY:-}
      TON_PACKAGE_PRICES: ${TON_PACKAGE_PRICES:-{"pro":500000000}}
    command: uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: infra/docker/python.Dockerfile
    env_file:
      - ../.env
    environment:
      API_BASE_URL: http://api:8000
      BOT_TOKEN: ${BOT_TOKEN:-}
      MINI_APP_URL: ${MINI_APP_URL:-http://localhost:8080}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: uv run python -m apps.bot.main
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://api:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  miniapp:
    build:
      context: ..
      dockerfile: infra/docker/miniapp.Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      miniapp:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app:
    driver: bridge
